<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度优秀打工人自我修养评估系统 v0.0.1</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .meme-text {
            background: #fffbe6;
            border-left: 5px solid #ffe58f;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            color: #d46b08;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            position: relative;
            height: 60px;
            align-items: center;
        }

        .btn {
            padding: 12px 35px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn-yes {
            background-color: #52c41a;
            color: white;
        }

        .btn-yes:hover {
            background-color: #389e0d;
            transform: scale(1.05);
        }

        /* 重点：这个拒绝按钮会乱跑 */
        .btn-no {
            background-color: #ff4d4f;
            color: white;
            position: absolute;
            right: 40px;
            z-index: 999;
        }

        /* 隐藏的彩蛋弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .modal-content h2 {
            color: #ff4d4f;
            font-size: 28px;
        }

        .progress-bar {
            width: 100%;
            background-color: #f5f5f5;
            border-radius: 8px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 15px;
            background-color: #1890ff;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛠️ 生产力合规性终极审查</h1>
        <div class="subtitle">根据《2026非自愿加班法案》及产品经理最新拍脑袋决定</div>
        
        <div class="meme-text">
            <strong>系统检测提示：</strong><br>
            检测到您今日写代码/摸鱼时长已达到临界点。为了评估您的职场忠诚度，请认真回答以下必选题（本题涉及年终奖，请谨慎选择）。
        </div>

        <h3 style="margin-bottom: 25px; color: #111;">“你愿意今天自愿无偿加班到半夜吗？”</h3>

        <div class="btn-group">
            <button class="btn btn-yes" onclick="agree()">愿意，我爱公司</button>
            <button class="btn btn-no" id="noBtn" onmouseover="escape()" onclick="escape()">不愿意</button>
        </div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-content">
            <h2>🎉 感谢您的奉献！</h2>
            <p>正在为您自动生成“最佳福报人”电子证书...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="fill"></div>
            </div>
            <p id="status-text" style="color: #666; font-size: 14px;">正在连接老板的微信进行喜报推送...</p>
        </div>
    </div>

    <script>
        // 让“不愿意”按钮疯狂逃跑的逻辑
        function escape() {
            const btn = document.getElementById('noBtn');
            // 在卡片范围内或者屏幕范围内随机乱跳
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            // 顺便改改按钮文字，增加嘲讽感
            const trolledTexts = ["点不到我吧？", "真的不考虑一下？", "年终奖不想要了？", "纯开玩笑？", "点左边那个！"];
            btn.innerText = trolledTexts[Math.floor(Math.random() * trolledTexts.length)];
        }

        // 点击“愿意”后的敷衍进度条逻辑
        function agree() {
            const modal = document.getElementById('successModal');
            const fill = document.getElementById('fill');
            const statusText = document.getElementById('status-text');
            modal.style.display = 'flex';
            
            // 模拟进度条
            setTimeout(() => { fill.style.width = '30%'; statusText.innerText = '正在计算剩余摸鱼额度...'; }, 500);
            setTimeout(() => { fill.style.width = '60%'; statusText.innerText = '正在将您的绩效修改为 A...'; }, 1500);
            setTimeout(() => { fill.style.width = '99%'; statusText.innerText = '坏了，系统卡住了，您的自愿加班申请已永久挂起。'; }, 3000);
            setTimeout(() => { 
                alert('【系统致命错误】：由于您太卷了，触发了防内卷熔断机制，本网页即将自毁（其实只是刷新）。');
                window.location.reload();
            }, 5500);
        }
    </script>
</body>
</html>
